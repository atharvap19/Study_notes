<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StudyPlanner — Sign In</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
<div class="auth-page">
  <div class="auth-card">

    <!-- Logo -->
    <div class="logo">
      <div class="logo-icon">📚</div>
      <span class="logo-text">StudyPlanner</span>
    </div>

    <!-- Tabs -->
    <div class="auth-tabs">
      <button class="active" id="tab-login"    onclick="switchTab('login')">Sign In</button>
      <button             id="tab-register" onclick="switchTab('register')">Register</button>
    </div>

    <!-- Alert -->
    <div class="alert" id="alert"></div>

    <!-- ── Login Form ─────────────────────────────────────────────────── -->
    <div class="form-panel active" id="panel-login">
      <form id="form-login" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" placeholder="you@example.com" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn btn-primary" id="btn-login">
          Sign In
        </button>
      </form>
      <p style="text-align:center; margin-top:1.2rem; font-size:0.85rem; color:var(--clr-muted)">
        Demo — student@demo.com / password123 &nbsp;|&nbsp; teacher@demo.com / password123
      </p>
    </div>

    <!-- ── Register Form ──────────────────────────────────────────────── -->
    <div class="form-panel" id="panel-register">
      <form id="form-register" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label for="reg-name">Full Name</label>
          <input type="text" id="reg-name" placeholder="Rahul Sharma" required autocomplete="name" />
        </div>
        <div class="form-group">
          <label for="reg-email">Email</label>
          <input type="email" id="reg-email" placeholder="you@example.com" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="reg-password">Password</label>
          <input type="password" id="reg-password" placeholder="Min 6 characters" required minlength="6" autocomplete="new-password" />
        </div>
        <div class="form-group">
          <label for="reg-role">I am a …</label>
          <select id="reg-role" required onchange="onRoleChange(this.value)">
            <option value="">— select role —</option>
            <option value="student">Student</option>
            <option value="teacher">Teacher</option>
          </select>
        </div>

        <!-- Subject selection — shown after role is chosen -->
        <div class="form-group" id="subject-group" style="display:none">
          <label id="subject-label">Subjects</label>
          <div id="subject-pills" class="subject-pills">
            <!-- populated by auth.js -->
          </div>
          <p id="subject-hint" style="font-size:0.78rem;color:var(--clr-muted);margin-top:0.4rem"></p>
        </div>

        <button type="submit" class="btn btn-primary" id="btn-register">
          Create Account
        </button>
      </form>
    </div>

  </div>
</div>

<script src="js/auth.js"></script>
</body>
</html>
